<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roots — Family Stories</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f1ea;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .container { width: 100%; max-width: 640px; display: flex; flex-direction: column; height: 100%; }
    header { padding-bottom: 16px; border-bottom: 1px solid #d8cfc0; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #3a2e1f; font-weight: 600; }
    .subtitle { font-size: 14px; color: #7a6a55; margin-top: 4px; }
    #messages { flex: 1; overflow-y: auto; padding: 8px 4px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 15px; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #3a2e1f; color: #f5f1ea; border-bottom-right-radius: 4px; }
    .bot { align-self: flex-start; background: #ffffff; color: #3a2e1f; border-bottom-left-radius: 4px; border: 1px solid #e5dcc8; }
    .sources { font-size: 12px; color: #7a6a55; margin-top: 6px; font-style: italic; }
    .loading { align-self: flex-start; color: #7a6a55; font-style: italic; font-size: 14px; padding: 8px 16px; }
    form { display: flex; gap: 8px; padding-top: 16px; border-top: 1px solid #d8cfc0; }
    input { flex: 1; padding: 12px 16px; border: 1px solid #d8cfc0; border-radius: 24px; font-size: 15px; background: white; outline: none; }
    input:focus { border-color: #3a2e1f; }
    button { padding: 12px 20px; background: #3a2e1f; color: #f5f1ea; border: none; border-radius: 24px; font-size: 15px; cursor: pointer; font-weight: 500; }
    button:hover { background: #2a1e0f; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌱 Roots</h1>
      <div class="subtitle">Ask about our family stories</div>
    </header>

    <div id="messages">
      <div class="msg bot">
        Hi! I'm a guide to your family archive. Ask about any storyteller by name, or about themes like migration, family, food, faith, or community.
      </div>
    </div>

    <form id="chatForm">
      <input id="questionInput" type="text" placeholder="What did Rosa learn from her mother?" autocomplete="off" required />
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>

  <script src="config.js"></script>
  <script>
    const API_URL = window.CONFIG?.API_URL || "MISSING_CONFIG";

    const form = document.getElementById("chatForm");
    const input = document.getElementById("questionInput");
    const messages = document.getElementById("messages");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, type, sources) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      if (sources && sources.length > 0) {
        const src = document.createElement("div");
        src.className = "sources";
        src.textContent = "Source: " + sources.join(", ");
        div.appendChild(src);
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function addLoading() {
      const div = document.createElement("div");
      div.className = "loading";
      div.id = "loadingMsg";
      div.textContent = "Thinking…";
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeLoading() {
      const el = document.getElementById("loadingMsg");
      if (el) el.remove();
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      sendBtn.disabled = true;
      addLoading();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        removeLoading();

        if (data.error) {
          addMessage("Error: " + data.error, "bot");
        } else {
          addMessage(data.answer, "bot", data.sources);
        }
      } catch (err) {
        removeLoading();
        addMessage("Network error: " + err.message, "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
